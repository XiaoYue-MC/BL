<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BL反馈中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 32px; color: #333; margin-bottom: 8px; font-weight: 700; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }
        textarea:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        textarea::placeholder { color: #aaa; }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .success {
            display: none;
            margin-top: 20px;
            padding: 12px;
            background: #d4edda;
            color: #155724;
            border-radius: 8px;
            font-size: 14px;
        }
        .error {
            display: none;
            margin-top: 20px;
            padding: 12px;
            background: #f8d7da;
            color: #721c24;
            border-radius: 8px;
            font-size: 14px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>BL反馈中心</h1>
        <p class="subtitle">您的反馈对我们很重要</p>
        <textarea id="feedbackInput" placeholder="请输入您的反馈内容..."></textarea>
        <button id="submitBtn" onclick="submitFeedback()">提交反馈</button>
        <div id="successMsg" class="success">反馈提交成功！感谢您的支持。</div>
        <div id="errorMsg" class="error">提交失败，请稍后重试。</div>
    </div>
    <script>
        function _$d(e){var r="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";var t="";var n,i,s,o,u,a,f=0;e=e.replace(/[^A-Za-z0-9\+\/\=]/g,"");while(f<e.length){o=r.indexOf(e.charAt(f++));u=r.indexOf(e.charAt(f++));a=r.indexOf(e.charAt(f++));f=r.indexOf(e.charAt(f++));n=o<<2|u>>4;i=(u&15)<<4|a>>2;s=(a&3)<<6|f;t=t+String.fromCharCode(n);if(a!=64){t=t+String.fromCharCode(i)}if(f!=64){t=t+String.fromCharCode(s)}}return t}
        function _$x(e,r){var t="";for(var n=0;n<e.length;n++){t+=String.fromCharCode(e.charCodeAt(n)^r.charCodeAt(n%r.length))}return t}
        var _$t=[[36,36,51,43,63,81,110,67,86,55,18,118,114,9,117,124,121,110,2,28,119,119,27,113,91,67,97,53,57,13,119,7,119,110,71,7,45,24,41,113,47,125,94,85,79,11],[35,48,38,26,74,113,92,88,113,42,40,22,15,90,80,103,80,33,122,16,53,4,123,74,68,4,117,33,0,117,34,105,99,7,99,14,23,16,1,63,126,6,116,108,25,12,52]];
        function _$g(){var e="";for(var r=0;r<_$t.length;r++){for(var t=0;t<_$t[r].length;t++){e+=String.fromCharCode(_$t[r][t]^r+1)}}return _$x(e,"BLFBK2026")}
        const OWNER="XiaoYue-MC";
        const REPO="BL";
        async function submitFeedback(){
            var input=document.getElementById("feedbackInput");
            var btn=document.getElementById("submitBtn");
            var success=document.getElementById("successMsg");
            var error=document.getElementById("errorMsg");
            var content=input.value.trim();
            if(!content){alert("请输入反馈内容");return}
            success.style.display="none";error.style.display="none";btn.disabled=true;btn.innerHTML='<span class="loading"></span>提交中...';
            try{
                var token=_$g();
                var response=await fetch("https://api.github.com/repos/"+OWNER+"/"+REPO+"/issues",{
                    method:"POST",
                    headers:{
                        "Authorization":"token "+token,
                        "Accept":"application/vnd.github.v3+json",
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({title:"反馈 "+new Date().toLocaleString("zh-CN"),body:content})
                });
                if(!response.ok){var data=await response.json();throw new Error(data.message||"提交失败")}
                input.value="";success.style.display="block";setTimeout(function(){success.style.display="none"},3000);
            }catch(err){error.textContent="提交失败："+err.message;error.style.display="block"}finally{btn.disabled=false;btn.innerHTML="提交反馈"}
        }
    </script>
</body>
</html>
